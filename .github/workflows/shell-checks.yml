name: Shell Checks

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  shell-checks:
    name: Shell syntax and lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Verify bash syntax
        run: |
          shopt -s nullglob
          for script in *.sh; do
            bash -n "$script"
          done

      - name: Run shellcheck
        run: |
          shellcheck --severity=error \
            debug-delivery.sh \
            entrypoint.sh \
            install.sh \
            store-mail-debug.sh \
            store-mail-wrapper-debug.sh \
            store-mail-wrapper.sh \
            store-mail.sh \
            test-pipe.sh
